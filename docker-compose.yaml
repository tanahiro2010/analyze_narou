services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: narou_analyzer:latest
    env_file:
      - .env
    environment:
      NAROU_URL: ${NAROU_URL:-https://api.syosetu.com/}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deniai.app/v1}
      GENRE_ANALYZE_CONCURRENCY: ${GENRE_ANALYZE_CONCURRENCY:-4}
